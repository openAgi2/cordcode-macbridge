name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # P2-6: 固定 gitleaks 版本（不用 @latest），避免每次 CI 解析不同版本、破坏可复现性。
      - run: go install github.com/zricethezav/gitleaks/v8@v8.21.2
      - run: gitleaks git --redact --config .gitleaks.toml .
      - run: gitleaks dir --redact --config .gitleaks.toml .

  go:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # 分页测试(go-bridge TestPaginatedMessages*/TestListSessionsPagination*)
      # 通过 codex.New() 需要 codex CLI;缺失会 panic "codex CLI not found in PATH"。
      - run: npm install -g @openai/codex --force
      - run: go build ./go-bridge
      - run: go test ./go-bridge/... -count=1
      - run: go test ./... -count=1
        working-directory: relay-server
      # P2-6: 依赖漏洞扫描。govulncheck 仅报告实际可达的漏洞，降低噪音。
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./go-bridge/...
      - run: govulncheck ./...
        working-directory: relay-server

  macbridge:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # 净增长 strict gate（BridgeProvider 第三轮 + ChatViewModel Generation/MessageSync 第四轮）
      # 需要同 org 的 cordcode-ios 同仓测量。
      # best-effort：iOS 仓若不可访问（私有/token 不足）则跳过，gate 自身会在缺 iOS 时 graceful skip。
      - name: Checkout adjacent iOS repo (best-effort, for hygiene gate)
        uses: actions/checkout@v6
        with:
          repository: openAgi2/cordcode-ios
          path: cordcode-ios
        continue-on-error: true
      - name: Net-growth gate (BridgeProvider + ChatViewModel strict)
        env:
          CORDCODE_HYGIENE_STRICT: "1"
        run: CORDCODE_IOS_ROOT="$GITHUB_WORKSPACE/cordcode-ios" ./scripts/check-architecture-hygiene.sh
      - run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer || true
      - run: xcodebuild -project MacBridge/CordCodeLink.xcodeproj -scheme CordCodeLink -configuration Debug -destination 'platform=macOS' build
      - run: ./scripts/build-unsigned-release.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cordcode-macbridge-unsigned
          path: |
            dist/*.zip
            dist/*.sha256
