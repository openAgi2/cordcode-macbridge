name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # P2-6: 固定 gitleaks 版本（不用 @latest），避免每次 CI 解析不同版本、破坏可复现性。
      - run: go install github.com/zricethezav/gitleaks/v8@v8.21.2
      - run: gitleaks git --redact --config .gitleaks.toml .
      - run: gitleaks dir --redact --config .gitleaks.toml .

  go:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./go-bridge
      - run: go test ./go-bridge/... -count=1
      - run: go test ./... -count=1
        working-directory: relay-server
      # P2-6: 依赖漏洞扫描。govulncheck 仅报告实际可达的漏洞，降低噪音。
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./go-bridge/...
      - run: govulncheck ./...
        working-directory: relay-server

  macbridge:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: xcodebuild -project MacBridge/CCCodeBridge.xcodeproj -scheme CCCodeBridge -configuration Debug -destination 'platform=macOS' build
      - run: ./scripts/build-unsigned-release.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cordcode-macbridge-unsigned
          path: |
            dist/*.zip
            dist/*.sha256
