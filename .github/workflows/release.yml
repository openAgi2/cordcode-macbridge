name: Unsigned Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Build unsigned package
        run: ./scripts/build-unsigned-release.sh "${{ steps.version.outputs.version }}"
      - name: Create or update prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "CCCode MacBridge $tag" \
              --notes-file docs/unsigned-release-notes.md \
              --prerelease
          fi
          gh release upload "$tag" dist/*.zip dist/*.sha256 --clobber
