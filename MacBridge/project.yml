name: CCCodeBridge
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  CCCodeBridge:
    type: application
    supportedDestinations: [macOS]
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: MacBridge
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: "CCCode Bridge"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: "public.app-category.developer-tools"
        LSUIElement: false
        CCCODEOfficialRelayEndpoint: "wss://relay.byteseek.uk:8443"
    preBuildScripts:
      - name: Build go-bridge runtime
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          RUNTIME_OUTPUT="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/cccode-bridge-runtime"
          RUNTIME_PACKAGE="github.com/openAgi2/cccode-macbridge/go-bridge"
          RUNTIME_VERSION="${CCCODE_RUNTIME_VERSION:-${MARKETING_VERSION:-0.1.0-dev}}"
          RUNTIME_COMMIT="${CCCODE_RUNTIME_COMMIT:-$(git rev-parse --short=12 HEAD 2>/dev/null || printf unknown)}"
          RUNTIME_DATE="${CCCODE_RUNTIME_DATE:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
          RUNTIME_LDFLAGS="-X ${RUNTIME_PACKAGE}.runtimeVersion=${RUNTIME_VERSION} -X ${RUNTIME_PACKAGE}.runtimeCommit=${RUNTIME_COMMIT} -X ${RUNTIME_PACKAGE}.runtimeDate=${RUNTIME_DATE}"
          RUNTIME_ARCH="${ARCHS%% *}"
          case "$RUNTIME_ARCH" in
            arm64) GO_ARCH=arm64 ;;
            x86_64) GO_ARCH=amd64 ;;
            *) echo "Unsupported runtime architecture: $RUNTIME_ARCH" >&2; exit 1 ;;
          esac
          mkdir -p "$(dirname "$RUNTIME_OUTPUT")"
          cd "${SRCROOT}/.."
          GOOS=darwin GOARCH="$GO_ARCH" go build -trimpath -ldflags "$RUNTIME_LDFLAGS" -o "$RUNTIME_OUTPUT" ./go-bridge/cmd/cccode-bridge-runtime
          chmod +x "$RUNTIME_OUTPUT"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.openagi.cccode.macbridge
        CODE_SIGN_STYLE: Automatic
        ARCHS: arm64
  CCCodeBridgeTests:
    type: bundle.unit-test
    platform: macOS
    supportedDestinations: [macOS]
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: MacBridgeTests
      - path: MacBridge/App/OpenCodeLaunchAgentCredentials.swift
      - path: MacBridge/App/OpenCodeCredentialsGenerator.swift
    dependencies:
      - target: CCCodeBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.openagi.cccode.macbridge.tests
        GENERATE_INFOPLIST_FILE: YES
        ARCHS: arm64
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CCCodeBridge.app/Contents/MacOS/CCCodeBridge"
        BUNDLE_LOADER: "$(TEST_HOST)"
