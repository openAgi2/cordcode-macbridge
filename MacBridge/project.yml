name: CCCodeBridge
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  CCCodeBridge:
    type: application
    supportedDestinations: [macOS]
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: MacBridge
    preBuildScripts:
      - name: Build go-bridge runtime
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          RUNTIME_OUTPUT="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/cccode-bridge-runtime"
          mkdir -p "$(dirname "$RUNTIME_OUTPUT")"
          cd "${SRCROOT}/.."
          go build -o "$RUNTIME_OUTPUT" ./go-bridge/cmd/cccode-bridge-runtime
          chmod +x "$RUNTIME_OUTPUT"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.openagi.cccode.macbridge
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "CCCode Bridge"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_LSUIElement: NO
        CODE_SIGN_STYLE: Automatic
        ARCHS: arm64
  CCCodeBridgeTests:
    type: bundle.unit-test
    platform: macOS
    supportedDestinations: [macOS]
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: MacBridgeTests
    dependencies:
      - target: CCCodeBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.openagi.cccode.macbridge.tests
        GENERATE_INFOPLIST_FILE: YES
        ARCHS: arm64
        TEST_HOST: ""
        BUNDLE_LOADER: ""
